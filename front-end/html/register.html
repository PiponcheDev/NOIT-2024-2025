<!DOCTYPE html>
<html lang="bg">
<head>
    <!--metadata-->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--tab view-->
    <title>BgBus</title>
    <link rel="icon" href="../media/bus-solid.svg">
    <!--css file-->
    <link rel="stylesheet" href="../css/login-register.css">
    <!--fontawesome icons imbed-->
    <script src="https://kit.fontawesome.com/b56d58b9c9.js" crossorigin="anonymous" defer></script>
    <!--google fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <section>
        <div id="name-logo">
            <i class="fa-solid fa-bus" id="logo"></i>
            <h1 id="name">BgBus</h1>
        </div>    
        <form action="#" method="post">
            <input type="text" id="username" class="input" placeholder="Създадете потребителско име">
            <input type="text" id="email" class="input" placeholder="Въведете си имейла">
            <input type="password" id="pass" class="input" placeholder="Създадете си парола">
            <input type="submit" id="submit" value="Регистрирай">
        </form>
        <h3>Имаш акаунт?<br><br><a href="login.html">Влез в профила си</a></h3>
    </section>
</body>
</html>
